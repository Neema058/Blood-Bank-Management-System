{% extends 'base.html' %}
{% block title %}Edit Donor{% endblock %}
{% block page_title %}<i class="fas fa-edit me-2"></i>Edit Donor{% endblock %}
{% block content %}
<div class="row justify-content-center"><div class="col-md-7">
<div class="form-card">
  <h5 style="color:var(--dark-red);font-weight:700;margin-bottom:20px;">Edit Donor — {{ donor.full_name }}</h5>
  <form method="POST">
    {% csrf_token %}
    <div class="row g-3">
      <div class="col-md-6"><label class="form-label">Full Name</label><input type="text" name="full_name" class="form-control" value="{{ donor.full_name }}" required></div>
      <div class="col-md-6"><label class="form-label">Phone</label><input type="text" name="phone" class="form-control" value="{{ donor.phone }}"></div>
      <div class="col-md-6"><label class="form-label">Email</label><input type="email" name="email" class="form-control" value="{{ donor.email }}"></div>
      <div class="col-12"><label class="form-label">Address</label><textarea name="address" class="form-control" rows="2">{{ donor.address }}</textarea></div>
      <div class="col-12"><label class="form-label">Medical History</label><textarea name="medical_history" class="form-control" rows="2">{{ donor.medical_history }}</textarea></div>
    </div>
    <div class="d-flex gap-2 mt-4">
      <button type="submit" class="btn btn-primary flex-fill" style="padding:12px;"><i class="fas fa-save me-2"></i>Save Changes</button>
      <a href="/donors/{{ donor.donor_id }}/" class="btn btn-outline-secondary flex-fill" style="border-radius:10px;padding:12px;">Cancel</a>
    </div>
  </form>
</div>
</div></div>
{% endblock %}
