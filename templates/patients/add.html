{% extends 'base.html' %}
{% block title %}Add Patient{% endblock %}
{% block page_title %}<i class="fas fa-user-plus me-2"></i>Register New Patient{% endblock %}
{% block content %}
<div class="row justify-content-center">
<div class="col-md-7">
<div class="form-card">
  <h5 style="color:var(--dark-red);font-weight:700;margin-bottom:20px;">Patient Registration</h5>
  <form method="POST">
    {% csrf_token %}
    <div class="row g-3">
      <div class="col-md-8"><label class="form-label">Full Name *</label><input type="text" name="full_name" class="form-control" required></div>
      <div class="col-md-4"><label class="form-label">Age *</label><input type="number" name="age" class="form-control" required min="1"></div>
      <div class="col-md-4">
        <label class="form-label">Gender *</label>
        <select name="gender" class="form-select" required>
          <option value="M">Male</option><option value="F">Female</option><option value="O">Other</option>
        </select>
      </div>
      <div class="col-md-4">
        <label class="form-label">Blood Group Needed *</label>
        <select name="blood_group" class="form-select" required>
          <option value="">-- Select --</option>
          <option>A+</option><option>A-</option><option>B+</option><option>B-</option>
          <option>O+</option><option>O-</option><option>AB+</option><option>AB-</option>
        </select>
      </div>
      <div class="col-md-4"><label class="form-label">Contact *</label><input type="text" name="contact" class="form-control" required placeholder="03XX-XXXXXXX"></div>
      <div class="col-md-8"><label class="form-label">Hospital / Clinic Name *</label><input type="text" name="hospital_name" class="form-control" required></div>
      <div class="col-md-4"><label class="form-label">Doctor Name</label><input type="text" name="doctor_name" class="form-control"></div>
      <div class="col-12"><label class="form-label">Address</label><textarea name="address" class="form-control" rows="2"></textarea></div>
    </div>
    <div class="d-flex gap-2 mt-4">
      <button type="submit" class="btn btn-primary flex-fill" style="padding:12px;"><i class="fas fa-save me-2"></i>Register Patient</button>
      <a href="/patients/" class="btn btn-outline-secondary flex-fill" style="border-radius:10px;padding:12px;">Cancel</a>
    </div>
  </form>
</div>
</div>
</div>
{% endblock %}
