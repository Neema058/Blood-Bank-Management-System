{% extends 'base.html' %}
{% block title %}Change Password{% endblock %}
{% block page_title %}<i class="fas fa-lock me-2"></i>Change Password{% endblock %}
{% block content %}
<div class="row justify-content-center"><div class="col-md-5">
<div class="form-card">
  <h5 style="color:var(--dark-red);font-weight:700;margin-bottom:20px;">Change Password</h5>
  <form method="POST">
    {% csrf_token %}
    <div class="mb-3"><label class="form-label">Current Password</label><input type="password" name="old_password" class="form-control" required></div>
    <div class="mb-3"><label class="form-label">New Password</label><input type="password" name="new_password" class="form-control" required minlength="6"></div>
    <div class="mb-4"><label class="form-label">Confirm New Password</label><input type="password" name="confirm_password" class="form-control" required></div>
    <button type="submit" class="btn btn-primary w-100" style="padding:12px;font-weight:600;"><i class="fas fa-lock me-2"></i>Change Password</button>
    <a href="/" class="btn btn-outline-secondary w-100 mt-2" style="border-radius:10px;">Cancel</a>
  </form>
</div>
</div></div>
{% endblock %}
